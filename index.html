<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在打开邮箱...</title>
    
    <meta http-equiv="refresh" content="0;url=mailto:love-after@outlook.com?subject=来自网站的咨询&body=你好，我想了解更多信息：">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { 
            font-size: 22px; 
            margin-bottom: 12px; 
            color: #2c3e50; 
        }
        p { 
            font-size: 15px; 
            color: #7f8c8d; 
            margin-bottom: 30px; 
            line-height: 1.6; 
        }
        .mail-btn {
            display: inline-block;
            background-color: #5a8dee;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(90, 141, 238, 0.3);
        }
        .mail-btn:active {
            transform: scale(0.96); /* 按下时的点击反馈 */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>正在跳转邮箱...</h1>
        <p>如果您的手机没有自动打开邮件客户端，<br>请点击下方按钮手动唤起。</p>
        
        <a href="mailto:love-after@outlook.com?subject=来自网站的咨询&body=你好，我想了解更多信息：" class="mail-btn">
            打开本地邮箱
        </a>
    </div>

</body>
</html>
